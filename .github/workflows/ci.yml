name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [created]

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Build ──────────────────────────────────────────────────────────────────
  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            runner: ubuntu-24.04
            artifact: meshkvm-linux-x86_64
            binary: meshkvm

          

          - name: macos-arm64
            runner: macos-15          # native Apple Silicon runner
            artifact: meshkvm-macos-arm64
            binary: meshkvm

          - name: windows-x86_64
            runner: windows-latest
            artifact: meshkvm-windows-x86_64
            binary: meshkvm.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2    # Node.js 24 native, better than actions/cache
        with:
          key: ${{ matrix.name }}

      - name: Install Linux system deps
        if: matrix.runner == 'ubuntu-24.04'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libx11-dev libxtst-dev libxdo-dev xclip

      - name: Build
        run: cargo build --release
        # No --target flag — each runner builds for its native arch.
        # macOS arm64 runner IS aarch64-apple-darwin, no cross-compile needed.

      - name: Package
        shell: bash
        run: |
          mkdir -p dist
          cp target/release/${{ matrix.binary }} dist/${{ matrix.artifact }}${{ runner.os == 'Windows' && '.exe' || '' }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/

  # ── Lint ───────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust + components
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install Linux system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libx11-dev libxtst-dev libxdo-dev

      - name: Cache
        uses: Swatinem/rust-cache@v2

      - name: fmt
        run: cargo fmt --check
        continue-on-error: true   # fmt is advisory until code is fully formatted

      - name: clippy
        run: cargo clippy -- -A dead_code -A unused_imports -A unused_variables

  # ── Release ────────────────────────────────────────────────────────────────
  release:
    name: Attach binaries to release
    needs: build
    runs-on: ubuntu-24.04
    if: github.event_name == 'release'
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
