name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [created]

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Build ──────────────────────────────────────────────────────────────────
  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: meshkvm-linux-x86_64

          - name: macos-x86_64
            runner: macos-13          # last Intel macOS runner
            target: x86_64-apple-darwin
            artifact: meshkvm-macos-x86_64

          - name: macos-arm64
            runner: macos-latest      # M-series arm64 runner
            target: aarch64-apple-darwin
            artifact: meshkvm-macos-arm64

          - name: windows-x86_64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: meshkvm-windows-x86_64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-

      - name: Install Linux system deps
        if: matrix.runner == 'ubuntu-latest'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libx11-dev libxtst-dev libxdo-dev xclip

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary
        shell: bash
        run: |
          mkdir -p dist
          EXT=""
          if [[ "${{ matrix.runner }}" == "windows-latest" ]]; then EXT=".exe"; fi
          cp target/${{ matrix.target }}/release/meshkvm${EXT} dist/${{ matrix.artifact }}${EXT}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/

  # ── Lint ───────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install Linux system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libx11-dev libxtst-dev libxdo-dev

      - name: fmt
        run: cargo fmt --check

      - name: clippy
        run: cargo clippy -- -W clippy::all -A dead_code -A unused

  # ── Release ────────────────────────────────────────────────────────────────
  release:
    name: Attach binaries to release
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
